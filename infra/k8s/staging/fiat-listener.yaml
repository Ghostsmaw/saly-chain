apiVersion: apps/v1
kind: Deployment
metadata:
  name: fiat-listener
  namespace: salychain-staging
  labels:
    app: fiat-listener
    environment: staging
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fiat-listener
  template:
    metadata:
      labels:
        app: fiat-listener
    spec:
      containers:
        - name: fiat-listener
          image: ghcr.io/salychain/fiat-listener:staging
          ports:
            - containerPort: 4020
              name: http
          envFrom:
            - secretRef:
                name: fiat-listener-secrets
          env:
            - name: PORT
              value: "4020"
            - name: EXECUTION_BASE_URL
              value: "http://execution.salychain-staging.svc.cluster.local:4003"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: fiat-listener
  namespace: salychain-staging
spec:
  selector:
    app: fiat-listener
  ports:
    - port: 4020
      targetPort: http
      name: http
---
# PSP webhooks arrive via the edge; nothing else in the cluster may reach the
# listener. Combined with signature verification and WEBHOOK_ALLOWED_IPS this
# closes the "staging publishes :4020 to the whole cluster" gap.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: fiat-listener-ingress-only
  namespace: salychain-staging
spec:
  podSelector:
    matchLabels:
      app: fiat-listener
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 4020
