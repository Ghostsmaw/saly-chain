{{- if .Values.opsMonitor.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ops-monitor
  labels:
    app.kubernetes.io/name: l3-ops-monitor
spec:
  replicas: {{ .Values.opsMonitor.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: l3-ops-monitor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: l3-ops-monitor
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.opsMonitor.metricsPort | quote }}
    spec:
      containers:
        - name: ops-monitor
          image: "{{ .Values.global.imageRegistry }}/worker-l3-ops-monitor:{{ .Values.global.tag }}"
          ports:
            - name: http
              containerPort: {{ .Values.opsMonitor.healthPort }}
            - name: metrics
              containerPort: {{ .Values.opsMonitor.metricsPort }}
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-l3-env
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.opsMonitor.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-ops-monitor
  labels:
    app.kubernetes.io/name: l3-ops-monitor
spec:
  selector:
    app.kubernetes.io/name: l3-ops-monitor
  ports:
    - name: http
      port: {{ .Values.opsMonitor.healthPort }}
      targetPort: http
    - name: metrics
      port: {{ .Values.opsMonitor.metricsPort }}
      targetPort: metrics
{{- end }}
