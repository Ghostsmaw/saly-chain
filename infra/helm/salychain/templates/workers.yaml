{{- $ctx := . }}
{{- range .Values.workers }}
{{- $name := .name }}
{{- $metricsPort := default 9090 .metricsPort }}
{{- $replicas := default 1 .replicas }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $ctx.Release.Name }}-wkr-{{ $name }}
  labels:
    {{- include "salychain.labels" $ctx | nindent 4 }}
    {{- include "salychain.selectorLabels" (dict "ctx" $ctx "name" $name "kind" "worker") | nindent 4 }}
spec:
  replicas: {{ $replicas }}
  revisionHistoryLimit: {{ $ctx.Values.defaults.revisionHistoryLimit }}
  selector:
    matchLabels:
      {{- include "salychain.selectorLabels" (dict "ctx" $ctx "name" $name "kind" "worker") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "salychain.selectorLabels" (dict "ctx" $ctx "name" $name "kind" "worker") | nindent 8 }}
      annotations:
        {{- toYaml $ctx.Values.podAnnotations | nindent 8 }}
        prometheus.io/port: {{ $metricsPort | quote }}
    spec:
      serviceAccountName: {{ include "salychain.serviceAccountName" $ctx }}
      {{- with $ctx.Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $name }}
          image: "{{ $ctx.Values.global.image.registry }}/worker-{{ $name }}:{{ $ctx.Values.global.image.tag }}"
          imagePullPolicy: {{ $ctx.Values.global.image.pullPolicy }}
          ports:
            - name: metrics
              containerPort: {{ $metricsPort }}
          env:
            - name: METRICS_PORT
              value: {{ $metricsPort | quote }}
            - name: OTEL_SERVICE_NAME
              value: {{ $name | quote }}
          envFrom:
            - configMapRef:
                name: {{ $ctx.Release.Name }}-shared-env
            - secretRef:
                name: {{ $ctx.Release.Name }}-{{ $name }}-env
                optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml $ctx.Values.defaults.resources | nindent 12 }}
          securityContext:
            {{- toYaml $ctx.Values.defaults.securityContext | nindent 12 }}
{{- end }}
