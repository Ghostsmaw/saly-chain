global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # All NestJS services expose /metrics at the ROOT (the /v1 global prefix is
  # excluded for the metrics endpoint by @salychain/observability).
  - job_name: salychain-services
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:4000 # gateway
          - host.docker.internal:4001 # ledger
          - host.docker.internal:4002 # wallet
          - host.docker.internal:4003 # execution
          - host.docker.internal:4004 # compliance
          - host.docker.internal:4005 # risk
          - host.docker.internal:4006 # liquidity
          - host.docker.internal:4007 # routing
          - host.docker.internal:4008 # intent
          - host.docker.internal:4009 # apikeys
          - host.docker.internal:4010 # webhooks
          - host.docker.internal:4011 # agents
          - host.docker.internal:4012 # identity
          - host.docker.internal:4013 # contract-registry
          - host.docker.internal:4014 # admin
          - host.docker.internal:4015 # analytics-ingest
          - host.docker.internal:4016 # analytics-api
          - host.docker.internal:4017 # analytics-datastreams
          - host.docker.internal:4018 # analytics-datashares
          - host.docker.internal:4019 # analytics-intelligence
          - host.docker.internal:4021 # merchant
          - host.docker.internal:4022 # stablecoin
          - host.docker.internal:4099 # signer
        labels:
          env: local

  # Workers are plain Node processes; they expose /metrics via a small telemetry
  # server (see @salychain/observability startWorkerObservabilityServer).
  - job_name: salychain-workers
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:9101 # chain-listener-base
          - host.docker.internal:9102 # chain-listener-base-bridge
          - host.docker.internal:9102 # chain-listener-xrpl
          - host.docker.internal:9103 # chain-listener-l3
          - host.docker.internal:9104 # l3-rollup-monitor
          - host.docker.internal:9105 # fiat-listener
          - host.docker.internal:9106 # analytics-indexer
          - host.docker.internal:9108 # stablecoin-por
        labels:
          env: local
