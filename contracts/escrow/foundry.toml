[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 1_000_000
via_ir = true
fuzz = { runs = 256 }
evm_version = "paris"
gas_reports = ["SalyEscrow"]
remappings = [
  "@openzeppelin/=lib/openzeppelin-contracts/",
  "forge-std/=lib/forge-std/src/"
]

[fmt]
line_length = 110
tab_width = 4
bracket_spacing = true
multiline_func_header = "all"

[rpc_endpoints]
base-sepolia = "${BASE_RPC_URL}"
